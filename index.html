<!doctype html>
<html lang="ja">

<head prefix="og: http://ogp.me/ns# fb: http://ogp.me/ns/fb# website: http://ogp.me/ns/website#">
  <title>eHagaki</title>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="投稿専用Nostrクライアント。デバイス上で画像・動画を圧縮してからアップロード。エディター内に直接コンテンツを表示。" />
  <meta name="theme-color" content="#2b664b" />

  <meta property="og:site_name" content="eHagaki" />
  <meta property="og:title" content="eHagaki" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lokuyow.github.io/ehagaki/" />
  <meta property="og:image" content="https://lokuyow.github.io/ehagaki/ehagaki_ogp.webp" />
  <meta property="og:description" content="投稿専用Nostrクライアント。デバイス上で画像・動画を圧縮してからアップロード。エディター内に直接コンテンツを表示" />
  <meta property="og:locale" content="ja_JP" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@Lokuyow" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="eHagaki" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/ehagaki_icon.svg" sizes="any" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>

<body ontouchstart="">
  <script>
    (function () {
      var THEME_MODE_KEY = 'themeMode';
      var DARK_MODE_KEY = 'darkMode';
      var PREFERENCE_METADATA_KEY = 'settingsPreferenceMetadata';
      var THEME_QUERY_KEY = 'embedTheme';
      var DEFAULT_THEME_QUERY_KEY = 'defaultTheme';

      function readPreferenceMetadata() {
        try {
          var stored = localStorage.getItem(PREFERENCE_METADATA_KEY);
          if (!stored) {
            return {};
          }

          var parsed = JSON.parse(stored);
          return typeof parsed === 'object' && parsed !== null ? parsed : {};
        } catch {
          return {};
        }
      }

      function writeDarkModeSource(source) {
        try {
          var metadata = readPreferenceMetadata();
          var sources = metadata.sources && typeof metadata.sources === 'object'
            ? metadata.sources
            : {};
          sources.darkMode = source;
          localStorage.setItem(PREFERENCE_METADATA_KEY, JSON.stringify({
            embedBootstrapApplied: metadata.embedBootstrapApplied === true,
            sources: sources
          }));
        } catch {
        }
      }

      function parseThemeQuery(search, key) {
        var value = new URLSearchParams(search).get(key);
        if (!value) {
          return null;
        }

        var normalized = value.trim().toLowerCase();
        if (normalized === 'system' || normalized === 'light' || normalized === 'dark') {
          return normalized;
        }

        return null;
      }

      var themeMode = localStorage.getItem(THEME_MODE_KEY);
      var hasStoredThemeMode = themeMode === 'system' || themeMode === 'light' || themeMode === 'dark';
      var hasLegacyDarkMode = localStorage.getItem(DARK_MODE_KEY) !== null;
      if (themeMode !== 'system' && themeMode !== 'light' && themeMode !== 'dark') {
        var legacyDarkMode = localStorage.getItem(DARK_MODE_KEY);
        themeMode = legacyDarkMode === null
          ? 'system'
          : legacyDarkMode === 'true'
            ? 'dark'
            : 'light';
        localStorage.setItem(THEME_MODE_KEY, themeMode);
        if (legacyDarkMode !== null) {
          localStorage.removeItem(DARK_MODE_KEY);
        }
      } else if (localStorage.getItem(DARK_MODE_KEY) !== null) {
        localStorage.removeItem(DARK_MODE_KEY);
      }

      var embedTheme = parseThemeQuery(window.location.search, THEME_QUERY_KEY);
      var defaultTheme = parseThemeQuery(window.location.search, DEFAULT_THEME_QUERY_KEY);

      if (embedTheme !== null) {
        themeMode = embedTheme;
        localStorage.setItem(THEME_MODE_KEY, themeMode);
        localStorage.removeItem(DARK_MODE_KEY);
        writeDarkModeSource('parentForced');
      } else if (!hasStoredThemeMode && !hasLegacyDarkMode && defaultTheme !== null) {
        themeMode = defaultTheme;
        localStorage.setItem(THEME_MODE_KEY, themeMode);
        localStorage.removeItem(DARK_MODE_KEY);
        writeDarkModeSource('parentDefault');
      }

      var isDark = themeMode === 'dark'
        ? true
        : themeMode === 'light'
          ? false
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
      var root = document.documentElement;
      if (isDark) {
        root.classList.add('dark');
        root.style.colorScheme = 'dark';
      } else {
        root.classList.add('light');
        root.style.colorScheme = 'light';
      }
    })();
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
